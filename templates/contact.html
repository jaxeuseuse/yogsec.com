{% extends "layout2.html" %}

{% block title %}
Contact
{% endblock %}

{% block main %}

<div class="container">
    <h2>Contact Dbag</h2>
    <p>For all your suggestions, question and concerns</p>
    <form id="contactForm">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send</button>
    </form>
    <div id="responseMessage"></div>
</div>

<style>
    body {
        font-family: Arial, sans-serif;
    }
    .container {
        max-width: 60vw;
        margin: auto;
        padding: 5vw;
    }
    input, textarea {
        width: 100%;
        padding: 1.5vw;
        margin: 0.5vw 0;
        font-size: 1em;
    }
    button {
        padding: 1em;
        background-color: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 1em;
    }
    #responseMessage {
        margin-top: 1vw;
        font-size: 1em;
    }
    #secret_clarg_button {
        color: white;
        background-color: white;
        border: none;
        width: 3.2%;
        margin: auto;
        position: absolute;
        top: 1vh;
        left: 1vw;
    }
</style>

<script>
    $(document).ready(function() {
        $("#contactForm").bind("submit", function() {
            $.ajax({
                type: "POST",
                cache: false,
                url: "https://script.google.com/macros/s/AKfycbzJX1hCjkbq3SnkG77XQS6hPVkX2OLEGiw4KIhCsihmya23DSiIBeWghd_aj17cQa7s1Q/exec",  // Replace with your script URL
                data: $(this).serializeArray(),
                success: function (data) {  // If 200 OK
                    $("#contactForm")[0].reset();  // Clear the form
                    $("#responseMessage").text("Thank you for contacting us! El-Dbag III will personally get back to you shortly!");
                },
                error: function (xhr, text, error) {  // If 40x or 50x; errors
                    $("#responseMessage").text("Error sending message! Try again in 100 years!");
                }
            });
            return false; // Prevent default form submission
        });
    });
</script>
{% endblock %}
